name: Server integration tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    name: Run server integration tests
    runs-on: ubuntu-latest
    env:
      MONGO_URI: mongodb://localhost:27017
      CI: true
      JWT_SECRET: testsecret
      ADMIN_SEED_EMAIL: admin@careerconnect.local
      ADMIN_SEED_PASS: StrongPass123!
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cleanup old Docker resources
        run: |
          docker ps -a || true
          docker rm -f mongo-ci || true
          docker volume prune -f || true

      - name: Start MongoDB (pinned image + health check)
        run: |
          docker pull mongo:6.0.27

          docker run -d \
            --name mongo-ci \
            -p 127.0.0.1:27017:27017 \
            --health-cmd="mongo --eval 'db.runCommand({ ping: 1 })' || mongosh --eval 'db.runCommand({ ping: 1 })'" \
            --health-interval=30s \
            --health-timeout=20s \
            --health-retries=20 \
            --health-start-period=120s \
            mongo:6.0.27 \
            --bind_ip_all \
            --wiredTigerCacheSizeGB 1

      - name: Wait for MongoDB health
        run: |
          for i in {1..180}; do
            running=$(docker inspect --format='{{.State.Running}}' mongo-ci 2>/dev/null || echo "false")
            status=$(docker inspect --format='{{.State.Health.Status}}' mongo-ci)

            if [ "$running" != "true" ]; then
              echo "MongoDB container stopped unexpectedly"
              docker logs mongo-ci || true
              exit 1
            fi

            if [ "$status" = "healthy" ]; then
              if docker exec mongo-ci sh -c "mongo --quiet --eval \"db.runCommand({ ping: 1 }).ok\" || mongosh --quiet --eval \"db.runCommand({ ping: 1 }).ok\"" | grep -q "1"; then
                echo "MongoDB is healthy and responding to ping"
                break
              fi
            fi

            if [ $((i % 20)) -eq 0 ]; then
              echo "Attempt $i: status=$status"
              docker logs --tail 30 mongo-ci || true
            fi

            sleep 2
          done

          final_status=$(docker inspect --format='{{.State.Health.Status}}' mongo-ci)
          if [ "$final_status" != "healthy" ]; then
            echo "MongoDB did not become healthy in time"
            docker logs mongo-ci
            exit 1
          fi

      - name: Wait for MongoDB ping readiness
        run: |
          for i in {1..60}; do
            if docker exec mongo-ci sh -c "mongo --eval 'db.runCommand({ ping: 1 })' || mongosh --eval 'db.runCommand({ ping: 1 })'" >/dev/null 2>&1; then
              echo "MongoDB ping check passed"
              break
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Ping attempt $i still not ready"
            fi
            sleep 2
          done

          if ! docker exec mongo-ci sh -c "mongo --eval 'db.runCommand({ ping: 1 })' || mongosh --eval 'db.runCommand({ ping: 1 })'" >/dev/null 2>&1; then
            echo "MongoDB ping check failed after retries"
            docker logs mongo-ci || true
            exit 1
          fi

      - name: Verify MongoDB TCP readiness
        run: |
          for i in {1..30}; do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/27017' 2>/dev/null; then
              echo "MongoDB TCP port is reachable"
              exit 0
            fi
            sleep 1
          done
          echo "MongoDB TCP port 27017 did not open in time"
          docker logs mongo-ci || true
          exit 1

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Reset test database
        run: |
          docker exec mongo-ci sh -c "mongo --eval \"db.getSiblingDB('test').dropDatabase()\" || mongosh --eval \"db.getSiblingDB('test').dropDatabase()\""

      - name: Seed admin user for integration tests
        run: npm run seed --prefix server

      - name: Run server integration tests
        run: npm --prefix server run test:int

      - name: Dump Mongo logs on failure
        if: failure()
        run: docker logs mongo-ci || true

      - name: Stop MongoDB container
        if: always()
        run: docker rm -f mongo-ci || true
